<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridWorld Policy Evaluation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="h-screen bg-gray-50 text-gray-900 flex flex-col font-sans">
        <!-- Header -->
        <header class="bg-indigo-600 text-white shadow-md py-4 px-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">GridWorld Policy Evaluation</h1>
            <div class="flex items-center gap-4">
                <span id="convergence-msg"
                    class="text-sm font-medium bg-indigo-800 px-3 py-1 rounded-full opacity-0 transition-opacity">Not
                    Converged</span>
                <span id="iteration-count" class="text-sm font-medium bg-indigo-700 px-3 py-1 rounded-full">Iteration:
                    0</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow flex p-6 gap-6">

            <!-- Controls Sidebar -->
            <aside class="w-80 bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col gap-6">

                <!-- Grid Dimensions -->
                <div class="form-group">
                    <label for="grid-size" class="block text-sm font-medium text-gray-700 mb-1">Grid Size (n x
                        n)</label>
                    <input type="number" id="grid-size" min="5" max="9" value="5"
                        class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                </div>

                <!-- Entity Selection Mode -->
                <div class="mode-selection space-y-3">
                    <h3 class="text-sm font-medium text-gray-700">Placement Mode</h3>

                    <label
                        class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors bg-green-50 border-green-200"
                        id="mode-start-label">
                        <input type="radio" name="placement-mode" value="start" checked
                            class="h-4 w-4 text-green-600 focus:ring-green-500">
                        <span class="ml-3 font-medium text-green-800 flex-grow">Set Start</span>
                        <div class="w-4 h-4 rounded-full bg-emerald-500"></div>
                    </label>

                    <label
                        class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors"
                        id="mode-goal-label">
                        <input type="radio" name="placement-mode" value="goal"
                            class="h-4 w-4 text-red-600 focus:ring-red-500">
                        <span class="ml-3 font-medium text-red-800 flex-grow">Set Goal</span>
                        <div class="w-4 h-4 rounded-full bg-rose-500"></div>
                    </label>

                    <label
                        class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors"
                        id="mode-obstacle-label">
                        <input type="radio" name="placement-mode" value="obstacle"
                            class="h-4 w-4 text-gray-600 focus:ring-gray-500">
                        <span class="ml-3 font-medium text-gray-800 flex-grow">Set Obstacle</span>
                        <span id="obstacle-counter" class="text-xs text-gray-500 mr-2">(0/3)</span>
                        <div class="w-4 h-4 rounded-full bg-slate-600"></div>
                    </label>
                </div>

                <div class="flex-grow"></div>

                <!-- Actions -->
                <div class="flex flex-col gap-3">
                    <button id="btn-reset"
                        class="w-full py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                        Reset Grid
                    </button>
                    <button id="btn-run"
                        class="w-full justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors flex items-center gap-2">
                        <span>Run Value Iteration</span>
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </button>
                </div>
            </aside>

            <!-- Grid Display -->
            <section
                class="flex-grow bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col items-center justify-center p-8 overflow-hidden relative">

                <!-- Overlay loading spinner -->
                <div id="loading-overlay"
                    class="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-10 hidden">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                    <p class="text-indigo-800 font-medium">Running value iteration...</p>
                </div>

                <div class="w-full flex justify-around items-center h-full">
                    <!-- Value Matrix Container -->
                    <div class="matrix-wrapper flex flex-col items-center">
                        <h2 class="text-lg font-semibold text-gray-800 mb-6">Value Matrix</h2>
                        <div class="flex">
                            <!-- Y-axis values -->
                            <div class="y-axis flex flex-col justify-around text-sm text-gray-800 font-medium font-mono"
                                style="margin-right: 12px;" id="value-y-axis"></div>
                            <div class="flex flex-col">
                                <div id="value-grid-container"
                                    class="grid select-none shadow-md overflow-hidden rounded-md matrix-grid bg-white border-l border-t border-blue-500">
                                    <!-- Grid cells will be generated here -->
                                </div>
                                <!-- X-axis values -->
                                <div class="x-axis flex justify-around text-sm text-gray-800 font-medium font-mono w-full"
                                    style="margin-top: 8px;" id="value-x-axis"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="h-full border-r-2 border-gray-200 mx-4"></div>

                    <!-- Policy Matrix Container -->
                    <div class="matrix-wrapper flex flex-col items-center">
                        <h2 class="text-lg font-semibold text-gray-800 mb-6">Policy Matrix</h2>
                        <div class="flex">
                            <!-- Y-axis values -->
                            <div class="y-axis flex flex-col justify-around text-sm text-gray-800 font-medium font-mono"
                                style="margin-right: 12px;" id="policy-y-axis"></div>
                            <div class="flex flex-col">
                                <div id="policy-grid-container"
                                    class="grid select-none shadow-md overflow-hidden rounded-md matrix-grid bg-white border-l border-t border-blue-500">
                                    <!-- Grid cells will be generated here -->
                                </div>
                                <!-- X-axis values -->
                                <div class="x-axis flex justify-around text-sm text-gray-800 font-medium font-mono w-full"
                                    style="margin-top: 8px;" id="policy-x-axis"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
